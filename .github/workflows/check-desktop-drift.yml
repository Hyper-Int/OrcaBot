name: Check desktop drift

on:
  pull_request:
    paths:
      - "controlplane/src/**/*.ts"
      - "controlplane/wrangler.production.toml"
      - "desktop/workerd/config/workerd.desktop.capnp"
      - "desktop/app/src-tauri/src/main.rs"
      - "desktop/scripts/dev.sh"
      - "desktop/scripts/check-drift.mjs"
      - "desktop/scripts/drift-allowlist.json"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run drift detector
        run: node desktop/scripts/check-drift.mjs
