name: Check static catalogs

on:
  schedule:
    # Mondays at 13:00 UTC
    - cron: "0 13 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - "frontend/src/data/openrouter-models.json"
      - "frontend/src/data/claude-subagents.json"
      - "frontend/scripts/check-catalogs.mjs"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check catalogs
        id: check
        working-directory: frontend
        continue-on-error: true
        run: npm run check-catalogs | tee /tmp/catalog-report.txt
      - name: Open issue on drift
        if: steps.check.outcome == 'failure' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/catalog-report.txt', 'utf8');
            const title = 'Catalog drift detected (weekly check)';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'catalog-drift',
            });
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: '```\n' + body + '\n```',
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: 'Run `npm run check-catalogs` in `frontend/` to reproduce.\n\n```\n' + body + '\n```',
                labels: ['catalog-drift'],
              });
            }
      - name: Fail job if drift
        if: steps.check.outcome == 'failure'
        run: exit 1
